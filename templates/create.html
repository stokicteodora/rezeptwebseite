<!--
File: create.html
Author: Teodora Stokic
Date: 26.06.2026
Version: 1.2
Description: Recipe creation page. Allows users to create new recipes
including name, description, image upload, ingredients, and steps.
-->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Rezept erstellen</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="{{ url_for('static', filename='js/create.js') }}" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="detail-body">
  <div class="detail-sidebar">
    <a href="{{ url_for('home') }}"><i class="fa-solid fa-house"></i> Startseite</a>
  </div>

  <div class="detail-page">
    <div class="detail-main">
      <div class="detail-title-box">
        <h1>Neues Rezept erstellen</h1>
      </div>

      <div class="detail-description-box">
        <form method="POST" action="/recipe/create" enctype="multipart/form-data">
          <label>Name</label>
          <input type="text" name="name" required>

          <label>Beschreibung</label>
          <textarea name="description" required></textarea>

          <label>Bild</label>
          <input type="file" name="image" accept="image/*">

          <label>Vorbereitungszeit (Minuten)</label>
          <input type="number" name="preparation_time" required>

          <label>Portionen</label>
          <input type="number" name="portions" required>

          <label>Schwierigkeitsgrad</label>
          <select name="difficulty">
            <option value="Einfach">Einfach</option>
            <option value="Mittel">Mittel</option>
            <option value="Schwierig">Schwierig</option>
          </select>

          <label>Kategorie</label>
          <select name="category_id">
            {% for category in categories %}
              <option value="{{ category.id }}">{{ category.name }}</option>
            {% endfor %}
          </select>

          <h2>Zutaten</h2>
          <!-- New ingredient rows are added here by create.js -->
          <div id="ingredients">
            <div class="ingredient-row">
              <input type="text" name="ingredient_name[]" placeholder="Name">
              <!-- quantity and unit are optional -->
              <input type="number" name="ingredient_quantity[]" placeholder="Menge">
              <input type="text" name="ingredient_unit[]" placeholder="Einheit (g, ml, EL...)">
            </div>
          </div>
          <button type="button" onclick="addIngredient()">+ Zutat hinzufügen</button>
          <h2>Zubereitungsschritte</h2>
          <!-- New step rows are added here by create.js -->
          <div id="steps">
            <div class="step-row">
              <textarea name="step_description[]" placeholder="Schritt 1"></textarea>
            </div>
          </div>

          <button type="button" onclick="addStep()">
            + Schritt hinzufügen
          </button>
          <br>
          <button type="submit">
            Rezept erstellen
          </button>

        </form>
      </div>
    </div>
  </div>

</body>
</html>
