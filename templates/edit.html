<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <title>{{ recipe.name }} bearbeiten</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/edit.js') }}" defer></script>
  </head>

  <body class="detail-body">
    <div class="detail-sidebar">
      <a href="{{ url_for('home') }}">Startseite</a>
    </div>

    <div class="detail-page">
      <div class="detail-main">
        <div class="detail-title-box">
          <h1>Rezept bearbeiten</h1>
        </div>

        <div class="detail-description-box">
          <form method="POST" action="{{ url_for('edit_recipe', id=recipe.id) }}" enctype="multipart/form-data">
            <label>Name</label>
            <input type="text" name="name" value="{{ recipe.name }}" required>

            <label>Beschreibung</label>
            <textarea name="description" required>{{ recipe.description }}</textarea>

            <label>Bild</label>
            <input type="file" name="image" accept="image/*">
            <p>Aktuell: {{ recipe.image }}</p>

            <label>Vorbereitungszeit (Minuten)</label>
            <input type="number" name="preparation_time" value="{{ recipe.preparation_time }}" required>

            <label>Portionen</label>
            <input type="number" name="portions" value="{{ recipe.portions }}" required>

            <label>Schwierigkeitsgrad</label>
            <select name="difficulty">
              <option value="Einfach" {% if recipe.difficulty == 'Einfach' %}selected{% endif %}>Einfach</option>
              <option value="Mittel" {% if recipe.difficulty == 'Mittel' %}selected{% endif %}>Mittel</option>
              <option value="Schwierig" {% if recipe.difficulty == 'Schwierig' %}selected{% endif %}>Schwierig</option>
            </select>

            <label>Kategorie</label>
            <select name="category_id">
              {% for category in categories %}
                <option value="{{ category.id }}" {% if category.id == recipe.category_id %}selected{% endif %}>{{ category.name }}</option>
              {% endfor %}
            </select>

            <h2>Zutaten</h2>
            <div id="ingredients">
              {% for ingredient in ingredients %}
                <div class="ingredient-row">
                  <input type="text" name="ingredient_name_{{ ingredient.id }}" value="{{ ingredient.name }}">
                  <input type="number" name="ingredient_quantity_{{ ingredient.id }}" value="{{ ingredient.quantity }}">
                  <input type="text" name="ingredient_unit_{{ ingredient.id }}" value="{{ ingredient.measurement_unit }}">
                </div>
              {% endfor %}
            </div>

            <h2>Zubereitungsschritte</h2>
            <div id="steps">
              {% for step in steps %}
                <div class="step-row">
                  <textarea name="step_description_{{ step.id }}">{{ step.description }}</textarea>
                </div>
              {% endfor %}
            </div>

            <button type="submit">Speichern</button>
          </form>
        </div>
      </div>
    </div>

  </body>
</html>
